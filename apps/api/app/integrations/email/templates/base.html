<!--
  Shared layout every outbound email extends. Inline CSS only — no
  style block, no external stylesheet — email clients strip both.
  Table-based layout for the same reason (max compatibility, not a
  style choice). Keep this file's structure stable; per-email content
  lives entirely in each template's own content block.
-->
<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}UHAS SMS{% endblock %}</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f4f5;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f5;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#ffffff;border-radius:8px;overflow:hidden;border:1px solid #e5e7eb;">
          <tr>
            <td style="background-color:#C7D52F;padding:0;font-size:0;line-height:4px;">&nbsp;</td>
          </tr>
          <tr>
            <td style="padding:32px 24px 28px;">
              {% block content %}{% endblock %}
            </td>
          </tr>
          <tr>
            <td style="padding:18px 24px;border-top:1px solid #e5e7eb;background-color:#f9fafb;">
              <p style="margin:0 0 4px;color:#374151;font-size:12px;font-weight:bold;">{{ school_name }}</p>
              {% if school_address %}
              <p style="margin:0 0 4px;color:#6b7280;font-size:11.5px;line-height:1.5;">{{ school_address }}</p>
              {% endif %}
              {% if school_contact_email %}
              <p style="margin:0 0 10px;color:#6b7280;font-size:11.5px;">
                <a href="mailto:{{ school_contact_email }}" style="color:#1B6B3E;text-decoration:none;">{{ school_contact_email }}</a>
              </p>
              {% endif %}
              <p style="margin:0;color:#9ca3af;font-size:11px;">
                <a href="{{ preferences_link }}" style="color:#9ca3af;text-decoration:underline;">Manage email preferences</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
