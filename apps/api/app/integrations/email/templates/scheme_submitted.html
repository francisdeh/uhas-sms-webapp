{% extends "base.html" %}
{% block title %}Scheme submitted by {{ teacher_name }}{% endblock %}
{% block content %}
<p style="margin:0 0 16px;color:#111827;font-size:15px;">Hi,</p>
<p style="margin:0 0 20px;color:#111827;font-size:15px;line-height:1.5;">
  {{ teacher_name }} submitted <strong>{{ scheme_title }}</strong> for <strong>{{ class_name }}</strong>.
</p>
<p style="margin:0;">
  <a href="{{ link }}" style="display:inline-block;background-color:#1B6B3E;color:#ffffff;text-decoration:none;padding:10px 20px;border-radius:6px;font-size:14px;">Review scheme</a>
</p>
{% endblock %}
