{% extends "base.html" %}
{% block title %}Reset your password{% endblock %}
{% block content %}
<p style="margin:0 0 16px;color:#111827;font-size:15px;">Hi,</p>
<p style="margin:0 0 20px;color:#111827;font-size:15px;line-height:1.5;">
  We received a request to reset the password for your {{ school_name }} account. If this wasn't you, you can safely ignore this email.
</p>
<p style="margin:0;">
  <a href="{{ reset_link }}" style="display:inline-block;background-color:#1B6B3E;color:#ffffff;text-decoration:none;padding:10px 20px;border-radius:6px;font-size:14px;">Reset password</a>
</p>
{% endblock %}
