{% extends "base.html" %}
{% block title %}Attendance: {{ student_names }} marked absent{% endblock %}
{% block content %}
<p style="margin:0 0 16px;color:#111827;font-size:15px;">Hi,</p>
<p style="margin:0 0 20px;color:#111827;font-size:15px;line-height:1.5;">
  <strong>{{ student_names }}</strong> {{ was_were }} marked absent today ({{ date }}).
</p>
<p style="margin:0;">
  <a href="{{ link }}" style="color:#1B6B3E;font-size:14px;">View attendance</a>
</p>
{% endblock %}
