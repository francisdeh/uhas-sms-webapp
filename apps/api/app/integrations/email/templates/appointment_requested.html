{% extends "base.html" %}
{% block title %}Appointment requested{% endblock %}
{% block content %}
<p style="margin:0 0 16px;color:#111827;font-size:15px;">Hi {{ teacher_name }},</p>
<p style="margin:0 0 16px;color:#111827;font-size:15px;line-height:1.5;">
  {{ guardian_name }} would like to meet about {{ student_name }}.
</p>
{% if reason %}
<p style="margin:0 0 20px;padding:12px 16px;background-color:#f9fafb;border-left:3px solid #1B6B3E;color:#374151;font-size:14px;line-height:1.5;">
  {{ reason }}
</p>
{% endif %}
<p style="margin:0;">
  <a href="{{ link }}" style="display:inline-block;background-color:#1B6B3E;color:#ffffff;text-decoration:none;padding:10px 20px;border-radius:6px;font-size:14px;">Respond to request</a>
</p>
{% endblock %}
