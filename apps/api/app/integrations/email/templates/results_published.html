{% extends "base.html" %}
{% block title %}Results published: {{ exam_name }}{% endblock %}
{% block content %}
<p style="margin:0 0 16px;color:#111827;font-size:15px;">Hi,</p>
<p style="margin:0 0 20px;color:#111827;font-size:15px;line-height:1.5;">
  Results for <strong>{{ who }}</strong> are now published for {{ exam_name }}.
</p>
<p style="margin:0;">
  <a href="{{ link }}" style="display:inline-block;background-color:#1B6B3E;color:#ffffff;text-decoration:none;padding:10px 20px;border-radius:6px;font-size:14px;">View report card</a>
</p>
{% endblock %}
