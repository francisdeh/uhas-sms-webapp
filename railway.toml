[build]
builder = "railpack"

[build.args]
NODE_VERSION = "20"

[deploy]
# Apply migrations + seed prod-minimum (school + Firebase-backed users) before
# starting the app. db:seed:prod is idempotent — safe to re-run on every deploy.
startCommand = "npm run db:migrate && npm run db:seed:prod && npm run start"
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 5
