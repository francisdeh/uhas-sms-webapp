# Monorepo config — one service per app. Each service block sets a
# `source` so Railway only watches that path for changes and runs
# install/build/start scoped to it.

[[services]]
  name = "web"
  source = "apps/web"
  # Railpack auto-detects pnpm via `packageManager` in apps/web/package.json
  # + the root pnpm-lock.yaml, and natively understands the workspace —
  # so no corepack/install boilerplate here. We just filter to the web
  # package for the build + start steps.
  buildCommand = "pnpm --filter uhas-sms-webapp build"
  # No DB step here — Next.js has zero direct database access under
  # Strategy A (see CLAUDE.md). Schema migrations run on the api
  # service below; this just serves the built app.
  startCommand = "pnpm --filter uhas-sms-webapp start"
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 5

[[services]]
  name = "api"
  source = "apps/api"
  # Frozen install matches the committed uv.lock exactly.
  buildCommand = "uv sync --frozen"
  # Apply pending Alembic migrations before booting — safe to run on
  # every deploy (no-op when the schema is already current). Railway
  # assigns $PORT at runtime; binding 0.0.0.0 makes the service
  # reachable from the public URL Railway provisions for it.
  #
  # Supabase-platform migrations (supabase/migrations/ — Storage RLS
  # policies etc.) are NOT run here. They go through a separate,
  # manual `supabase db push` against the linked prod project — see
  # docs/DEPLOY.md. Baking that into every app deploy would mean
  # storing a Supabase access token in the app's runtime env for
  # something that changes rarely.
  startCommand = "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 5

[build]
builder = "railpack"

[build.args]
# Node for apps/web; Python pinned for apps/api via apps/api/.python-version.
NODE_VERSION = "20"
