# Monorepo config — one service per app. Each service block sets a
# `source` so Railway only watches that path for changes and runs
# install/build/start scoped to it.

[[services]]
  name = "web"
  source = "apps/web"
  buildCommand = "npm ci && npm run build"
  # Apply Drizzle migrations + idempotent prod seed before booting the
  # Next.js server. Both commands are no-ops when there's nothing to do.
  startCommand = "npm run db:migrate && npm run db:seed:prod && npm run start"
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 5

[[services]]
  name = "api"
  source = "apps/api"
  # Frozen install matches the committed uv.lock exactly.
  buildCommand = "uv sync --frozen"
  # Railway assigns $PORT at runtime; binding 0.0.0.0 makes the service
  # reachable from the public URL Railway provisions for it.
  startCommand = "uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT"
  restartPolicyType = "on_failure"
  restartPolicyMaxRetries = 5

[build]
builder = "railpack"

[build.args]
# Node for apps/web; Python pinned for apps/api via apps/api/.python-version.
NODE_VERSION = "20"
