services:
  db:
    image: postgres:16-alpine
    container_name: uhas_sms_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: uhas
      POSTGRES_PASSWORD: uhas_dev_secret
      POSTGRES_DB: uhas_sms
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uhas -d uhas_sms"]
      interval: 10s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: uhas_sms_adminer
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha-dark

volumes:
  postgres_data:
