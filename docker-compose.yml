services:
  inngest:
    image: inngest/inngest:latest
    container_name: uhas_sms_inngest
    restart: unless-stopped
    command:
      - inngest
      - dev
      - --host=0.0.0.0
      - --sdk-url=http://host.docker.internal:8000/api/inngest
    ports:
      - "8288:8288"
    extra_hosts:
      # `host.docker.internal` resolves out of the box on Docker Desktop
      # (Mac/Windows). On Linux this mapping is required for the same
      # hostname to reach the FastAPI dev server running on the host —
      # `uv run uvicorn ...` isn't containerized, so the API lives outside
      # this compose network.
      - "host.docker.internal:host-gateway"

  mailpit:
    image: axllent/mailpit:latest
    container_name: uhas_sms_mailpit
    restart: unless-stopped
    ports:
      # SMTP — point SMTP_HOST=localhost / SMTP_PORT=1025 at this, no
      # credentials needed. Web UI at http://localhost:8025 to view
      # everything this app's own SmtpEmailProvider sends in dev.
      # Distinct from the Supabase CLI's own local mail catcher (also
      # branded "Mailpit" in newer CLI versions) at :54324, which only
      # catches Supabase Auth's own emails, not this app's.
      - "1025:1025"
      - "8025:8025"
