services:
  inngest:
    image: inngest/inngest:latest
    container_name: uhas_sms_inngest
    restart: unless-stopped
    command:
      - inngest
      - dev
      - --host=0.0.0.0
      - --sdk-url=http://host.docker.internal:8000/api/inngest
    ports:
      - "8288:8288"
    extra_hosts:
      # `host.docker.internal` resolves out of the box on Docker Desktop
      # (Mac/Windows). On Linux this mapping is required for the same
      # hostname to reach the FastAPI dev server running on the host —
      # `uv run uvicorn ...` isn't containerized, so the API lives outside
      # this compose network.
      - "host.docker.internal:host-gateway"
