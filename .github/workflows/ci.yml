name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Monorepo note: every step in this file runs from `apps/web/` via
# `defaults.run.working-directory`. The FastAPI service in `apps/api/`
# lands in Phase 0 PR #2 and gets its own job.

jobs:
  test:
    name: Lint · Type check · Test · Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: uhas
          POSTGRES_PASSWORD: uhas_dev_secret
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U uhas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Tests + DB scripts read this. Points at the postgres service above.
      DATABASE_URL: postgresql://uhas:uhas_dev_secret@localhost:5432/uhas_sms_test
      DB_DRIVER: pg
      NODE_ENV: test

      # Placeholder Firebase config — Next.js bundles these at build time.
      # No real values needed; production gets the real ones from Railway.
      NEXT_PUBLIC_FIREBASE_API_KEY: dummy-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: dummy-project
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
      FIREBASE_PROJECT_ID: dummy-project
      FIREBASE_CLIENT_EMAIL: dummy@dummy.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\ndummy\n-----END PRIVATE KEY-----\n"

      # Forces firebase-admin to skip cert() at module load — `cert()` would
      # try to DER-parse the dummy PRIVATE_KEY above and crash Next's
      # page-data collection during `npm run build`. We never actually hit
      # the emulator in this job; the env var just steers init down the
      # emulator branch (which only needs a projectId).
      FIREBASE_AUTH_EMULATOR_HOST: localhost:9099

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Version is read from apps/web/package.json's `packageManager` field;
          # this step also wires `pnpm` onto PATH for subsequent steps.
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        # Run from repo root so the workspace lockfile is consulted.
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      - name: Set up test database
        run: pnpm db:test:setup

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  api:
    name: API · Lint · Type check · Test · Migrate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/api

    services:
      # Used by the alembic upgrade step below to prove the baseline
      # migration actually applies cleanly against a fresh Postgres.
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: uhas
          POSTGRES_PASSWORD: uhas_dev_secret
          POSTGRES_DB: uhas_sms_api_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U uhas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://uhas:uhas_dev_secret@localhost:5432/uhas_sms_api_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.10.11"
          enable-cache: true
          cache-dependency-glob: apps/api/uv.lock

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies (frozen)
        run: uv sync --frozen

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy app

      - name: Alembic upgrade head
        # Apply migrations FIRST — pytest needs the schema present
        # (feature tests insert into `schools`, `audit_log`, etc.).
        # Also proves the baseline migration applies cleanly against
        # fresh Postgres; catches SQL drift if a future migration
        # breaks the chain.
        run: uv run alembic upgrade head

      - name: Pytest
        run: uv run pytest

      - name: Setup pnpm
        # Needed for the drift step below — the script runs
        # `npx openapi-typescript` which resolves against the workspace.
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js (for OpenAPI drift step)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install workspace deps (for drift step)
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      - name: OpenAPI → TypeScript types drift check
        # Fails if a Pydantic schema changed in apps/api without
        # regenerating apps/web/src/types/api.d.ts. Boots FastAPI on
        # :8001, regenerates, diffs against committed.
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-api-types-drift.sh

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Heavy — only on push to main. PRs and develop pushes skip it.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test

    defaults:
      run:
        working-directory: apps/web

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: uhas
          POSTGRES_PASSWORD: uhas_dev_secret
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U uhas"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://uhas:uhas_dev_secret@localhost:5432/uhas_sms_e2e
      DB_DRIVER: pg
      FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
      # Baked into the JS bundle at build time. Without it, the browser
      # client SDK tries to auth against real Firebase, the dummy API key
      # gets rejected, login never completes, and globalSetup times out.
      NEXT_PUBLIC_USE_FIREBASE_EMULATOR: "true"
      E2E_BASE_URL: http://localhost:3100
      NEXT_PUBLIC_FIREBASE_API_KEY: dummy-api-key
      NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dummy.firebaseapp.com
      NEXT_PUBLIC_FIREBASE_PROJECT_ID: uhas-sms-dev
      NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dummy.appspot.com
      NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "000000000000"
      NEXT_PUBLIC_FIREBASE_APP_ID: "1:000000000000:web:0000000000000000000000"
      FIREBASE_PROJECT_ID: uhas-sms-dev
      FIREBASE_CLIENT_EMAIL: dummy@dummy.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY: "-----BEGIN PRIVATE KEY-----\ndummy\n-----END PRIVATE KEY-----\n"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Java (for Firebase Auth Emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        working-directory: ${{ github.workspace }}
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Install Firebase CLI
        run: pnpm add -g firebase-tools

      - name: Create .env.e2e for the CI run
        run: |
          cat > .env.e2e <<EOF
          DATABASE_URL=$DATABASE_URL
          DB_DRIVER=$DB_DRIVER
          FIREBASE_AUTH_EMULATOR_HOST=$FIREBASE_AUTH_EMULATOR_HOST
          NEXT_PUBLIC_FIREBASE_PROJECT_ID=$NEXT_PUBLIC_FIREBASE_PROJECT_ID
          E2E_BASE_URL=$E2E_BASE_URL
          EOF

      - name: Set up E2E database
        run: pnpm db:e2e:setup

      - name: Pre-seed E2E database
        # Without this, the Next webServer Playwright boots has no school
        # row to read — `getSchoolSettings()` throws and Playwright times
        # out waiting for the URL to return 200. globalSetup also seeds,
        # but Playwright pings the webServer URL *before* globalSetup runs.
        run: pnpm exec dotenv-cli -e .env.e2e -- pnpm exec tsx scripts/seed-db.ts --reset

      - name: Start Firebase Auth Emulator
        run: |
          firebase emulators:start --project uhas-sms-dev --only auth &
          # Wait for the emulator to respond before continuing.
          for i in $(seq 1 30); do
            if curl -sf "http://$FIREBASE_AUTH_EMULATOR_HOST/" >/dev/null 2>&1; then
              echo "Auth emulator up."
              exit 0
            fi
            sleep 2
          done
          echo "Auth emulator did not come up in time." >&2
          exit 1

      - name: Build app for E2E
        run: pnpm e2e:build

      - name: Run E2E tests
        run: pnpm e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/tests/e2e/.results/
          retention-days: 7
